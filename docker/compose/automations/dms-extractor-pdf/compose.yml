services:
  dms-extractor-pdf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dms-extractor-pdf
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    extends:
      file: ../nas-volumes.yml
      service: nas-base
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const fs=require(\"fs\"); const t=Number(fs.readFileSync(\"/tmp/heartbeat\",\"utf8\")); process.exit(Date.now()-t<90000?0:1)"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      backend:
        aliases: [dms-extractor-pdf]

networks:
  backend:
    external: true
    name: backend
