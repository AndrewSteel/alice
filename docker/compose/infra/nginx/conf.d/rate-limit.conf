# Rate-limiting zone for chat endpoint (http context)
# 20 requests per minute per IP address, 10MB shared memory
limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=20r/m;

# Rate-limiting zone for auth endpoints (POST only)
# Only count POST requests; GET/OPTIONS requests are excluded
map $request_method $auth_limit_key {
    POST    $binary_remote_addr;
    default "";
}
# 5 login attempts per minute per IP, 10MB shared memory
limit_req_zone $auth_limit_key zone=auth_limit:10m rate=5r/m;
